<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crucigrama Éxodo — Capítulos 11-20</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Crucigrama del Libro de Éxodo</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="capitulos-1-10.html">Cap. 1-10</a>
            <a href="capitulos-11-20.html" class="active">Cap. 11-20</a>
            <a href="capitulos-21-30.html">Cap. 21-30</a>
            <a href="capitulos-31-40.html">Cap. 31-40</a>
        </nav>
    </header>

    <main>
        <h2>Capítulos 11-20: De la Pascua al Sinaí</h2>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(0)">Crucigrama 1</button>
            <button class="tab-btn" onclick="switchTab(1)">Crucigrama 2</button>
            <button class="tab-btn" onclick="switchTab(2)">Crucigrama 3</button>
            <button class="tab-btn" onclick="switchTab(3)">Crucigrama 4</button>
        </div>

        <div id="puzzle-0" class="puzzle-box"></div>
        <div id="puzzle-1" class="puzzle-box" style="display:none"></div>
        <div id="puzzle-2" class="puzzle-box" style="display:none"></div>
        <div id="puzzle-3" class="puzzle-box" style="display:none"></div>
    </main>

    <footer>Crucigrama del Libro de Éxodo — Biblia Cristiana</footer>

    <script src="crossword.js"></script>
    <script>
        const puzzles = [
            {
                title: "La Pascua y la décima plaga (Cap. 11-12)",
                words: [
                    { word: "PRIMOGENITO", clue: "Todo primer nacido que murió en la décima y última plaga de Egipto" },
                    { word: "CORDERO", clue: "Animal sin defecto sacrificado la noche de la liberación" },
                    { word: "PASCUA", clue: "Fiesta instituida por Dios para recordar la liberación de Egipto" },
                    { word: "DINTEL", clue: "Parte superior de la puerta que fue marcada con sangre" },
                    { word: "AZIMOS", clue: "Panes sin levadura que el pueblo debía comer por siete días" },
                    { word: "HISOPO", clue: "Planta usada para aplicar la sangre del cordero en las puertas" },
                    { word: "NOCHE", clue: "Momento en que el ángel destructor pasó por toda la tierra de Egipto" }
                ]
            },
            {
                title: "El cruce del Mar Rojo (Cap. 13-14)",
                words: [
                    { word: "COLUMNA", clue: "Guiaba al pueblo de día como nube y de noche como fuego" },
                    { word: "CARROS", clue: "Vehículos de guerra del ejército del faraón que perseguían a Israel" },
                    { word: "EGIPTO", clue: "País del que el pueblo de Israel fue liberado por Dios" },
                    { word: "FUEGO", clue: "De noche, la columna que guiaba al pueblo era de esto" },
                    { word: "SECO", clue: "Así estaba el fondo del mar cuando los israelitas cruzaron" },
                    { word: "MURO", clue: "Las aguas se levantaron como esto a la derecha y a la izquierda" },
                    { word: "NUBE", clue: "De día, la columna que guiaba al pueblo era de esto" }
                ]
            },
            {
                title: "El viaje por el desierto (Cap. 15-17)",
                words: [
                    { word: "CODORNICES", clue: "Aves enviadas por Dios al atardecer para alimentar al pueblo" },
                    { word: "AMALEC", clue: "Pueblo enemigo que atacó a Israel en Refidim" },
                    { word: "MIRIAM", clue: "Profetisa y hermana de Moisés que cantó con pandero tras cruzar el mar" },
                    { word: "MANA", clue: "Alimento del cielo que aparecía cada mañana sobre el rocío" },
                    { word: "ROCA", clue: "Moisés la golpeó con su vara en Horeb y brotó agua" },
                    { word: "MARA", clue: "Lugar donde las aguas eran amargas y Dios las endulzó" },
                    { word: "AGUA", clue: "El pueblo se quejó a Moisés por la falta de esto en el desierto" }
                ]
            },
            {
                title: "El Sinaí y los Diez Mandamientos (Cap. 18-20)",
                words: [
                    { word: "MANDAMIENTOS", clue: "Las diez leyes sagradas que Dios entregó en el monte" },
                    { word: "TRUENOS", clue: "Sonidos que se escucharon cuando Dios descendió al Sinaí" },
                    { word: "JUECES", clue: "Líderes que Jetro aconsejó a Moisés nombrar para ayudarle" },
                    { word: "SINAI", clue: "Monte sagrado donde Dios entregó la ley a su pueblo" },
                    { word: "JETRO", clue: "Suegro de Moisés que le visitó y le aconsejó delegar autoridad" },
                    { word: "ROBAR", clue: "Acción prohibida por el octavo mandamiento" },
                    { word: "MATAR", clue: "Acción prohibida por el sexto mandamiento" }
                ]
            }
        ];

        let games = [];
        window.addEventListener('DOMContentLoaded', () => {
            games = puzzles.map((p, i) => new CrosswordGame(`puzzle-${i}`, p.words, p.title));
            games[0].activate();
        });

        function switchTab(idx) {
            document.querySelectorAll('.puzzle-box').forEach((el, i) => {
                el.style.display = i === idx ? '' : 'none';
            });
            document.querySelectorAll('.tab-btn').forEach((el, i) => {
                el.classList.toggle('active', i === idx);
            });
            games[idx].activate();
        }
    </script>
</body>
</html>
