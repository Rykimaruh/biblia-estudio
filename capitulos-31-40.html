<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crucigrama Éxodo — Capítulos 31-40</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Crucigrama del Libro de Éxodo</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="capitulos-1-10.html">Cap. 1-10</a>
            <a href="capitulos-11-20.html">Cap. 11-20</a>
            <a href="capitulos-21-30.html">Cap. 21-30</a>
            <a href="capitulos-31-40.html" class="active">Cap. 31-40</a>
        </nav>
    </header>

    <main>
        <h2>Capítulos 31-40: Del becerro de oro a la gloria de Dios</h2>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(0)">Crucigrama 1</button>
            <button class="tab-btn" onclick="switchTab(1)">Crucigrama 2</button>
            <button class="tab-btn" onclick="switchTab(2)">Crucigrama 3</button>
            <button class="tab-btn" onclick="switchTab(3)">Crucigrama 4</button>
        </div>

        <div id="puzzle-0" class="puzzle-box"></div>
        <div id="puzzle-1" class="puzzle-box" style="display:none"></div>
        <div id="puzzle-2" class="puzzle-box" style="display:none"></div>
        <div id="puzzle-3" class="puzzle-box" style="display:none"></div>
    </main>

    <footer>Crucigrama del Libro de Éxodo — Biblia Cristiana</footer>

    <script src="crossword.js"></script>
    <script>
        const puzzles = [
            {
                title: "El becerro de oro y el arrepentimiento (Cap. 31-33)",
                words: [
                    { word: "BEZALEEL", clue: "Artesano lleno del Espíritu de Dios, escogido para construir el tabernáculo" },
                    { word: "BECERRO", clue: "Ídolo de oro que el pueblo fabricó mientras Moisés estaba en el monte" },
                    { word: "GLORIA", clue: "Moisés le pidió a Dios que le permitiera ver su..." },
                    { word: "TABLAS", clue: "Dos piedras donde Dios mismo escribió los diez mandamientos" },
                    { word: "PECADO", clue: "Gran transgresión del pueblo al adorar un ídolo de oro" },
                    { word: "DANZA", clue: "El pueblo celebraba con esto alrededor del ídolo de oro" },
                    { word: "TIENDA", clue: "De reunión, lugar fuera del campamento donde Moisés hablaba con Dios" }
                ]
            },
            {
                title: "Nuevas tablas y ofrendas generosas (Cap. 34-36)",
                words: [
                    { word: "RESPLANDOR", clue: "El rostro de Moisés tenía esto al bajar del monte Sinaí" },
                    { word: "OFRENDAS", clue: "El pueblo trajo tantas que Moisés tuvo que pedir que dejaran de traer" },
                    { word: "ALIANZA", clue: "Dios renovó este pacto con Moisés y todo el pueblo" },
                    { word: "CELOSO", clue: "Nombre con que Dios se describió a sí mismo ante Moisés" },
                    { word: "ROSTRO", clue: "Parte de Moisés que brillaba después de hablar con Dios" },
                    { word: "PIEDRA", clue: "Material de las nuevas tablas donde Dios volvió a escribir la ley" },
                    { word: "VELO", clue: "Moisés usaba esto para cubrir su rostro resplandeciente ante el pueblo" }
                ]
            },
            {
                title: "Construcción de los objetos sagrados (Cap. 37-38)",
                words: [
                    { word: "CANDELERO", clue: "Objeto de oro puro labrado a martillo con siete brazos" },
                    { word: "COLUMNAS", clue: "Estructuras que sostenían las cortinas del atrio del tabernáculo" },
                    { word: "PERFUME", clue: "Compuesto aromático sagrado cuya fórmula no podía ser imitada" },
                    { word: "BRONCE", clue: "Metal del altar de los holocaustos y de la fuente para lavarse" },
                    { word: "ATRIO", clue: "Patio exterior que rodeaba todo el tabernáculo" },
                    { word: "PLATA", clue: "Metal usado para las basas donde se sostenían las columnas" }
                ]
            },
            {
                title: "Inauguración del tabernáculo (Cap. 39-40)",
                words: [
                    { word: "TABERNACULO", clue: "Santuario portátil que Moisés levantó el primer día del primer mes" },
                    { word: "TESTIMONIO", clue: "Las tablas de la ley guardadas dentro del arca sagrada" },
                    { word: "VESTIDURAS", clue: "Aarón y sus hijos fueron revestidos con estas ropas sagradas" },
                    { word: "ACEITE", clue: "Moisés ungió el tabernáculo y todos sus utensilios con este" },
                    { word: "GLORIA", clue: "La presencia de Dios que llenó el tabernáculo al ser levantado" },
                    { word: "NUBE", clue: "Cubrió la tienda de reunión cuando el tabernáculo fue terminado" },
                    { word: "ARCA", clue: "Primer objeto sagrado que Moisés colocó dentro del tabernáculo" }
                ]
            }
        ];

        let games = [];
        window.addEventListener('DOMContentLoaded', () => {
            games = puzzles.map((p, i) => new CrosswordGame(`puzzle-${i}`, p.words, p.title));
            games[0].activate();
        });

        function switchTab(idx) {
            document.querySelectorAll('.puzzle-box').forEach((el, i) => {
                el.style.display = i === idx ? '' : 'none';
            });
            document.querySelectorAll('.tab-btn').forEach((el, i) => {
                el.classList.toggle('active', i === idx);
            });
            games[idx].activate();
        }
    </script>
</body>
</html>
