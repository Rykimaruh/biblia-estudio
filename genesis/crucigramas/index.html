<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="book" content="genesis">
    <title>Crucigramas — Genesis — Biblia Estudio</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/crossword.css">
</head>
<body>
    <input type="text" id="mobile-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

    <header id="site-header"></header>

    <main>
        <div class="breadcrumb" id="breadcrumb"></div>

        <div id="section-nav"></div>
        <div id="sections-container"></div>
    </main>

    <footer id="site-footer"></footer>

    <script src="../../js/admin.js"></script>
    <script src="../../js/layout.js"></script>
    <script src="../../js/crossword-engine.js"></script>
    <script src="../../js/crossword-game.js"></script>
    <script>
    const allGames = {};
    let currentSection = null;

    fetch('../../data/genesis/crosswords.json')
        .then(r => r.json())
        .then(data => {
            buildPage(data);
            const hash = window.location.hash.slice(1);
            if (hash) {
                const section = data.sections.find(s => s.id === hash);
                if (section) { showSection(section.id); return; }
            }
            showSection('overview');
        })
        .catch(err => {
            console.error('Error loading crosswords:', err);
            document.getElementById('sections-container').innerHTML =
                '<div class="instructions"><h3>Crucigramas no disponibles</h3>' +
                '<p>Los crucigramas de Genesis aun no estan disponibles. Estamos trabajando en el contenido.</p></div>';
        });

    function buildPage(data) {
        const navEl = document.getElementById('section-nav');
        const container = document.getElementById('sections-container');

        let navHtml = '<h2>Crucigramas del Libro de Genesis</h2>';
        navHtml += '<div class="tabs" id="section-tabs">';
        navHtml += `<button class="tab-btn active" onclick="showSection('overview')">Inicio</button>`;
        for (const section of data.sections) {
            const label = section.id.replace('cap', 'Cap. ').replace('-', '-');
            navHtml += `<button class="tab-btn" onclick="showSection('${section.id}')">${label}</button>`;
        }
        navHtml += '</div>';
        navEl.innerHTML = navHtml;

        let html = '<div id="sec-overview" class="section active">';
        html += '<div class="instructions"><h3>Como jugar</h3><p>';
        html += '<b>1.</b> Haz clic en una casilla blanca para seleccionarla.<br><br>';
        html += '<b>2.</b> Escribe una letra con el teclado. El cursor avanza automaticamente.<br><br>';
        html += '<b>3.</b> Haz clic en la misma casilla para cambiar entre <b>horizontal</b> y <b>vertical</b>.<br><br>';
        html += '<b>4.</b> Usa los botones: <b>Verificar Respuestas</b>, <b>Dame una Pista</b> (5 por crucigrama), <b>Borrar Todo</b>.';
        html += '</p></div>';
        html += '<h2 style="margin-top:2rem;">Elige una seccion</h2>';
        html += '<div class="card-grid">';
        for (const section of data.sections) {
            html += `<div class="card" onclick="showSection('${section.id}')">`;
            html += `<h3>${section.title}</h3>`;
            html += `<p>${section.description}</p>`;
            html += `<span class="badge badge-active">${section.puzzles.length} crucigramas</span>`;
            html += '</div>';
        }
        html += '</div></div>';

        for (const section of data.sections) {
            html += `<div id="sec-${section.id}" class="section">`;
            html += `<h2>${section.title}</h2>`;
            html += `<div class="puzzle-selector" id="tabs-${section.id}">`;
            html += '<span class="puzzle-selector-label">Crucigrama:</span>';
            section.puzzles.forEach((p, i) => {
                const active = i === 0 ? ' active' : '';
                html += `<button class="puzzle-pill${active}" onclick="switchPuzzle('${section.id}', ${i})">${i + 1}</button>`;
            });
            html += '</div>';
            section.puzzles.forEach((p, i) => {
                const display = i === 0 ? '' : 'style="display:none"';
                html += `<div id="${section.id}-p${i}" class="puzzle-box" ${display}></div>`;
            });
            html += '</div>';
        }

        container.innerHTML = html;
        window._crosswordData = data;
    }

    function showSection(id) {
        currentSection = id;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        const secEl = document.getElementById('sec-' + id);
        if (secEl) secEl.classList.add('active');

        const tabs = document.querySelectorAll('#section-tabs .tab-btn');
        tabs.forEach(t => t.classList.remove('active'));
        if (id === 'overview') {
            tabs[0].classList.add('active');
        } else {
            const data = window._crosswordData;
            const idx = data.sections.findIndex(s => s.id === id);
            if (idx >= 0 && tabs[idx + 1]) tabs[idx + 1].classList.add('active');
        }

        if (id !== 'overview' && !allGames[id]) {
            const data = window._crosswordData;
            const section = data.sections.find(s => s.id === id);
            if (section) {
                const showReveal = window.isAdmin && window.isAdmin();
                allGames[id] = section.puzzles.map((p, i) =>
                    new CrosswordGame(`${id}-p${i}`, p.words, p.title, { showReveal })
                );
            }
        }

        if (allGames[id]) switchPuzzle(id, 0);
        if (id !== 'overview') window.location.hash = id;
        else window.history.replaceState(null, '', window.location.pathname);
        window.scrollTo(0, 0);
    }

    function switchPuzzle(sectionId, idx) {
        const section = window._crosswordData.sections.find(s => s.id === sectionId);
        if (!section) return;
        for (let i = 0; i < section.puzzles.length; i++) {
            const el = document.getElementById(`${sectionId}-p${i}`);
            if (el) el.style.display = i === idx ? '' : 'none';
        }
        const pills = document.querySelectorAll(`#tabs-${sectionId} .puzzle-pill`);
        pills.forEach((t, i) => t.classList.toggle('active', i === idx));
        if (allGames[sectionId] && allGames[sectionId][idx]) {
            allGames[sectionId][idx].activate();
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderBreadcrumb([
            { label: 'Inicio', href: '../../' },
            { label: 'Genesis', href: '../' },
            { label: 'Crucigramas' }
        ]);
    });
    </script>
</body>
</html>
