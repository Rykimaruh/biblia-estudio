<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="book" content="genesis">
    <title>Mapa — Genesis — Biblia Estudio</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/map.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
    <header id="site-header"></header>

    <main>
        <div class="breadcrumb" id="breadcrumb"></div>

        <h2>Mapa Interactivo — Genesis</h2>
        <p class="intro-text">
            Explora los lugares donde ocurrieron los eventos principales del libro de Genesis.
            Desde Ur de los Caldeos hasta Egipto, sigue las rutas de Abraham, Jacob y Jose.
        </p>

        <div class="map-wrapper">
            <div class="map-controls">
                <div class="map-controls-group">
                    <span style="font-weight:600; color: var(--color-brown);">Vista:</span>
                    <div class="tile-toggle">
                        <button id="tile-modern" class="tile-toggle-btn active">Moderno</button>
                        <button id="tile-ancient" class="tile-toggle-btn">Antiguo</button>
                    </div>
                </div>
                <div class="map-controls-group">
                    <span style="font-weight:600; color: var(--color-brown);">Rutas:</span>
                    <button class="route-btn active" data-route="abraham-journey">Abraham</button>
                    <button class="route-btn active" data-route="jacob-journey">Jacob</button>
                    <button class="route-btn active" data-route="joseph-route">Jose</button>
                </div>
            </div>

            <div id="bible-map"></div>

            <div class="map-legend">
                <div class="legend-item">
                    <span class="legend-dot" style="background:#8B6914;"></span> Ciudad
                </div>
                <div class="legend-item">
                    <span class="legend-dot" style="background:#6B8E23;"></span> Monte
                </div>
                <div class="legend-item">
                    <span class="legend-dot" style="background:#D4A017;"></span> Altar
                </div>
                <div class="legend-item">
                    <span class="legend-dot" style="background:#228B22;"></span> Jardin
                </div>
                <div class="legend-item">
                    <span class="legend-dot" style="background:#DC143C;"></span> Destruccion
                </div>
                <div class="legend-item">
                    <span class="legend-line" style="background:#c8a44e;"></span> Abraham
                </div>
                <div class="legend-item">
                    <span class="legend-line" style="background:#4a90d9;"></span> Jacob
                </div>
                <div class="legend-item">
                    <span class="legend-line" style="background:#d9534f;"></span> Jose
                </div>
            </div>
        </div>

        <div class="map-events-list">
            <h3>Ubicaciones principales</h3>
            <div id="events-list"></div>
        </div>
    </main>

    <footer id="site-footer"></footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../../js/admin.js"></script>
    <script src="../../js/layout.js"></script>
    <script src="../../js/bible-map.js"></script>
    <script>
        let bibleMap;

        document.addEventListener('DOMContentLoaded', () => {
            renderBreadcrumb([
                { label: 'Inicio', href: '../../' },
                { label: 'Genesis', href: '../' },
                { label: 'Mapa' }
            ]);

            fetch('../../data/genesis/locations.json')
                .then(r => r.json())
                .then(data => {
                    bibleMap = new BibleMap('bible-map', data);
                    renderEventsList(data);
                })
                .catch(err => {
                    console.error('Error loading map data:', err);
                    document.getElementById('bible-map').innerHTML =
                        '<div style="padding:2rem;text-align:center;">Error cargando los datos del mapa.</div>';
                });
        });

        function renderEventsList(data) {
            const container = document.getElementById('events-list');
            const markerColors = {
                city: '#8B6914', mountain: '#6B8E23', water: '#4682B4',
                battle: '#B22222', miracle: '#9B59B6', altar: '#D4A017',
                home: '#8B4513', garden: '#228B22', camp: '#CD853F',
                well: '#5B9BD5', destruction: '#DC143C', star: '#FFD700',
                fire: '#FF6347', oasis: '#3CB371', palace: '#8B4789'
            };
            const iconEmojis = {
                city: '\u{1F3D8}', mountain: '\u26F0', water: '\u{1F30A}',
                battle: '\u2694', miracle: '\u2728', altar: '\u{1F54A}',
                home: '\u{1F3E0}', garden: '\u{1F331}', camp: '\u26FA',
                well: '\u{1F4A7}', destruction: '\u{1F525}', star: '\u2B50',
                fire: '\u{1F525}', oasis: '\u{1F334}', palace: '\u{1F451}'
            };

            let html = '';
            for (const loc of data.locations) {
                const color = markerColors[loc.icon] || '#8B6914';
                const emoji = iconEmojis[loc.icon] || '\u{1F4CD}';
                const desc = loc.events.map(e => e.title).join('. ') + '.';

                html += `
                <div class="map-event-card" onclick="bibleMap.flyTo('${loc.id}')">
                    <div class="event-marker-icon" style="background:${color};">${emoji}</div>
                    <div class="event-info">
                        <h4>${loc.name}</h4>
                        <p>${desc}</p>
                    </div>
                </div>`;
            }
            container.innerHTML = html;
        }
    </script>
</body>
</html>
